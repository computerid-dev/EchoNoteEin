<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Edit Profil - EchoNote</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#050505">
<link rel="stylesheet" href="/assets/theme.css">
<link rel="stylesheet" href="../../../Create-Account/style.css">
</head>
<body>

<div class="auth-screen">

    <div class="auth-card">

        <div class="auth-logo" style="font-size:20px;">Edit Profil</div>

        <label class="section-label">Nama</label>
        <input type="text" id="editUsername">

        <label class="section-label">Bio</label>
        <textarea id="editBio" rows="2"></textarea>

        <label class="section-label">Link</label>
        <input type="url" id="editLink" placeholder="https://">

        <button type="button" id="saveEditBtn" style="width:100%; margin-top:16px;">
            Simpan Perubahan
        </button>

        <button type="button" class="secondary" style="width:100%; margin-top:8px;"
            onclick="window.location.href='index.html'">
            Batal
        </button>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="/assets/firebase-config.js"></script>
<script src="/assets/core.js"></script>
<script src="edit-profile.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Profil Saya - EchoNote</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#050505">
<link rel="stylesheet" href="/assets/theme.css">
<link rel="stylesheet" href="profile.css">
</head>
<body>

<div class="app-shell">

    <header class="topbar">
        <h1>Profil</h1>
        <a href="pengaturan/pengaturan_akun.html" style="font-size:20px;">⚙️</a>
    </header>

    <div class="profile-banner" id="profileBanner"></div>

    <div class="profile-head">
        <img id="profileAvatar" src="/EchoNote/logo-profile-default/en.png" alt="">
        <div class="name-row">
            <span id="profileName">Memuat...</span>
            <span id="verifiedBadge" class="badge hidden">✔️</span>
        </div>
        <span id="profileTag" class="tag">@...</span>
        <p id="profileBio" class="bio"></p>
        <a id="profileLink" class="link hidden" target="_blank" rel="noopener"></a>
    </div>

    <button class="secondary" style="margin:0 18px; width:calc(100% - 36px);"
        onclick="window.location.href='edit-profile.html'">
        Edit Profil
    </button>

    <div class="state-screen">
        <p style="font-size:12px;">Grid video/postingan milik user akan
        tampil di sini (TODO: query koleksi posts berdasarkan uid).</p>
    </div>

    <nav class="bottom-nav">
        <a class="nav-item" href="/EchoNote/feed/Home/home.html">🏠<span>Home</span></a>
        <a class="nav-item" href="/EchoNote/feed/Chat/privat-chat.html">💬<span>Chat</span></a>
        <a class="nav-item" href="/EchoNote/feed/offline-video/offline.html">⬇️<span>Offline</span></a>
        <a class="nav-item active" href="/EchoNote/feed/Me-Profile/index.html">👤<span>Profil</span></a>
    </nav>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="/assets/firebase-config.js"></script>
<script src="/assets/core.js"></script>
<script src="../script.js"></script>
<script src="profile.js"></script>

</body>
</html>

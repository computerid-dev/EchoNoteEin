<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pengaturan Akun - EchoNote</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#050505">
<link rel="stylesheet" href="/assets/theme.css">
<link rel="stylesheet" href="settings.css">
</head>
<body>

<div class="app-shell">

    <header class="topbar"><h1>Pengaturan Akun</h1></header>

    <div class="settings-list">

        <button class="settings-item secondary" onclick="location.href='verifikasi_akun/verifikasi-untuk-mendapatkan-centang-biru.html'">
            <span>✔️ Verifikasi Akun (Centang Biru)</span>
            <span>›</span>
        </button>

        <button class="settings-item secondary" id="changePasswordBtn">
            <span>🔒 Ganti Kata Sandi</span>
            <span>›</span>
        </button>

        <button class="settings-item secondary" id="changePhoneBtn">
            <span>📱 Ganti Nomor Telepon</span>
            <span>›</span>
        </button>

        <button class="settings-item secondary" id="logoutBtn" style="color:var(--danger);">
            <span>🚪 Keluar</span>
            <span>›</span>
        </button>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="/assets/firebase-config.js"></script>
<script src="/assets/core.js"></script>
<script src="settings.js"></script>

</body>
</html>

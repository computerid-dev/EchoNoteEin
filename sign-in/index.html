<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daftar - EchoNote</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#050505">
<link rel="stylesheet" href="/assets/theme.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-screen">

    <div class="auth-card">

        <div class="auth-logo">EchoNote</div>
        <p class="auth-sub">Buat akun baru</p>

        <form id="signinForm">

            <input type="email" id="regEmail" placeholder="Email (bisa Proton Mail)" required>
            <div class="field-error" id="errEmail"></div>

            <input type="tel" id="regPhone" placeholder="Nomor telepon, contoh 08123456789" required style="margin-top:10px;">
            <div class="field-error" id="errPhone"></div>

            <input type="password" id="regPassword" placeholder="Kata sandi" required style="margin-top:10px;">
            <button type="button" id="genPasswordBtn" class="secondary" style="width:100%; margin-top:8px; font-size:13px; padding:10px;">
                Buatkan kata sandi acak
            </button>
            <div class="field-error" id="errPassword"></div>

            <button type="submit" id="signinSubmit" style="width:100%; margin-top:14px;">
                Daftar
            </button>

        </form>

        <p class="auth-switch">
            Sudah punya akun? <a href="/login/index.html">Masuk</a>
        </p>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="/assets/firebase-config.js"></script>
<script src="/assets/core.js"></script>
<script src="script.js"></script>

</body>
</html>

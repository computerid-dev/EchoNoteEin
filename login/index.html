<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Masuk - EchoNote</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#050505">
<link rel="stylesheet" href="/assets/theme.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-screen">

    <div class="auth-card">

        <div class="auth-logo">EchoNote</div>
        <p class="auth-sub">Masuk ke akunmu</p>

        <form id="loginForm">

            <input type="text" id="loginIdentifier" placeholder="Email atau nomor telepon" required>
            <div class="field-error" id="errIdentifier"></div>

            <input type="password" id="loginPassword" placeholder="Kata sandi" required style="margin-top:10px;">
            <div class="field-error" id="errPassword"></div>

            <button type="submit" id="loginSubmit" style="width:100%; margin-top:6px;">
                Masuk
            </button>

        </form>

        <p class="auth-switch">
            Belum punya akun? <a href="/sign-in/index.html">Daftar</a>
        </p>

    </div>

</div>

<!-- Firebase Client SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="/assets/firebase-config.js"></script>
<script src="/assets/core.js"></script>
<script src="script.js"></script>

</body>
</html>
